<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Attendance System — Admin Login">
    <title>AI Attendance — Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <span class="logo-icon">🔒</span>
                <h1>Admin Portal</h1>
                <p>Enter the principal/mentor password</p>
            </div>

            {% if error %}
            <div class="alert alert-error">
                <span>⚠️</span> {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('admin_do_login') }}" method="POST">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password"
                           placeholder="Enter admin password" required autocomplete="off">
                </div>

                <button type="submit" class="btn btn-primary" id="admin-login-btn">
                    🔓 Unlock Dashboard
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px;">
                <a href="{{ url_for('login_page') }}"
                   style="color: var(--text-muted); font-size: 13px; text-decoration: none;">
                    ← Back to Teacher Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
